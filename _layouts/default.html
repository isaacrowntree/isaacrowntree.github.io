<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0A0A1A">

    {% seo %}

    <meta name="google-site-verification" content="7gEGmNa9BjGXAHTMIPBrED3YAl43OgnP4lPMhZXZXoQ" />
    <link rel="canonical" href="{{ site.url }}{% if page.url != '/index.html' %}{{ page.url }}{% endif %}"/>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/logo.png">

    <!-- Fonts: Inter (body), Instrument Serif (display), JetBrains Mono (mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Resume stylesheet -->
    <link rel="stylesheet" href="/css/resume.css">
    <link rel="stylesheet" href="/css/print.css" media="print">

    {% include analytics.html %}
  </head>
  <body>
    <!-- Top bar -->
    <nav class="topbar" aria-label="Primary">
      <a class="topbar__brand" href="/">
        <span class="display-serif">Isaac Rowntree</span>
        <span class="mono">head of tech</span>
      </a>
      <div class="topbar__nav">
        <a href="https://zackdesign.biz" class="topbar__link" target="_blank" rel="noopener">Zack Design</a>
        <a href="https://github.com/isaacrowntree" class="topbar__link" target="_blank" rel="noopener" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <button type="button" class="topbar__link" data-open-cmdk aria-label="Open command palette">
          <i class="fas fa-magnifying-glass"></i>
          <span class="kbd" data-kbd-mod>⌘</span><span class="kbd">K</span>
        </button>
      </div>
    </nav>

    <!-- Side rail (desktop only) -->
    <nav class="rail" aria-label="Section jumps">
      <button type="button" class="rail__dot" data-target="tldr" data-label="Overview" aria-label="Overview"></button>
      <button type="button" class="rail__dot" data-target="experience" data-label="Experience" aria-label="Experience"></button>
      <button type="button" class="rail__dot" data-target="work" data-label="Selected work" aria-label="Selected work"></button>
      <button type="button" class="rail__dot" data-target="oss" data-label="Open source" aria-label="Open source"></button>
      <button type="button" class="rail__dot" data-target="skills" data-label="Skills" aria-label="Skills"></button>
      <button type="button" class="rail__dot" data-target="references" data-label="References" aria-label="References"></button>
      <button type="button" class="rail__dot" data-target="beyond" data-label="Beyond code" aria-label="Beyond code"></button>
      <button type="button" class="rail__dot" data-target="contact" data-label="Contact" aria-label="Contact"></button>
    </nav>

    <!-- Command palette modal -->
    <div class="cmdk-overlay" id="cmdk" role="dialog" aria-modal="true" aria-label="Command palette" hidden="false">
      <div class="cmdk" role="combobox" aria-haspopup="listbox">
        <input type="text" class="cmdk__input" placeholder="Type to search sections or actions…" aria-label="Search">
        <div class="cmdk__list" role="listbox"></div>
        <div class="cmdk__footer">
          <span><span class="kbd">↑</span><span class="kbd">↓</span> navigate</span>
          <span><span class="kbd">↵</span> select</span>
          <span><span class="kbd" data-kbd-mod>⌘</span><span class="kbd">K</span> toggle</span>
          <span><span class="kbd">Esc</span> close</span>
        </div>
      </div>
    </div>

    <main>
      {{ content }}
    </main>

    <footer class="footer-bar">
      <div class="wrap">
        © {{ site.time | date: '%Y' }} Isaac Rowntree ·
        <a href="https://zackdesign.biz">Zack Design</a> ·
        Built with Jekyll
      </div>
    </footer>

    <script src="/js/app.js" defer></script>
  </body>
</html>
